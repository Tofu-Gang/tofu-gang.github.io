<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="style.css" />
        <title>Marek Pišl</title>
    </head>
    <body>
        <div id="flowers"><img src="img/svg/listy.svg" alt="" /></div>
        <div id="navbar">
            <span>Marek Pišl</span>
            <img src="img/svg/listy_2.svg" alt="" />
            <span>vita</span>
            <img src="img/svg/mail.svg" alt="" />
        </div>
        <div id="tiles">
            <div class="tile" id="visual_styles">
                <img src="img/tiles/tiles 1/loga_vizualni_styly_1.jpg" alt="" />
                <div class="title"><span>loga & vizuální styly</span></div>
            </div>
            <div class="tile" id="posters">
                <img src="img/tiles/tiles 1/plakaty_letaky_publikace_1.jpg" alt="" />
                <div class="title"><span>plakáty, letáky, publikace</span></div>
            </div>
            <div class="tile" id="painting">
                <img src="img/tiles/tiles 1/kresba_malba_1.jpg" alt="" />
                <div class="title"><span>kresba & malba</span></div>
            </div>
            <div class="tile" id="artwork">
                <img src="img/tiles/tiles 1/artwork_design_CD_LP_1.jpg" alt="" />
                <div class="title"><span>artwork & design CD a LP alb</span></div>
            </div>
            <div class="tile" id="shirts">
                <img src="img/tiles/tiles 1/trika_s_potiskem_1.jpg" alt="" />
                <div class="title"><span>trika s potiskem</span></div>
            </div>
            <div class="tile" id="businesscards">
                <img src="img/tiles/tiles 1/vizitky.jpg" alt="" />
                <div class="title"><span>vizitky</span></div>
            </div>
            <div class="tile" id="web">
                <img src="img/tiles/tiles 1/web_1.png" alt="" />
                <div class="title"><span>web</span></div>
            </div>
            <div class="tile" id="projects">
                <img src="img/tiles/tiles 1/projekty_specialni_realizace_1.jpg" alt="" />
                <div class="title"><span>projekty, speciální realizace</span></div>
            </div>
            <div class="tile" id="organs">
                <img src="img/tiles/tiles 1/varhany_1.jpg" alt="" />
                <div class="title"><span>varhany</span></div>
            </div>
        </div>
    </body>
</html>
